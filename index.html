<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Link Downloader</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">
  <div class="bg-white shadow-lg rounded-xl p-6 w-full max-w-md">
    <h1 class="text-xl font-bold mb-4 text-gray-800">Link Downloader</h1>

    <input id="urlInput" type="text" placeholder="Masukkan URL..."
      class="w-full border border-gray-300 rounded-lg px-3 py-2 mb-3 focus:outline-none focus:ring-2 focus:ring-blue-400">

    <button id="downloadBtn"
      class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 rounded-lg transition">
      Download
    </button>

    <div id="result" class="mt-4 text-sm text-gray-700"></div>
  </div>

<script>
const input = document.getElementById('urlInput');
const btn = document.getElementById('downloadBtn');
const result = document.getElementById('result');

btn.addEventListener('click', () => {
  const url = input.value.trim();
  result.innerHTML = '';

  if (!url) {
    result.innerHTML = '<p class="text-red-500">⚠️ URL tidak boleh kosong!</p>';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Memproses...';
  result.innerHTML = '<p class="text-gray-500 animate-pulse">Sedang memproses link, harap tunggu...</p>';

  setTimeout(() => {
    btn.disabled = false;
    btn.textContent = 'Download';

    const fileContent = `File hasil unduhan simulasi\nSumber URL: ${url}\nWaktu: ${new Date().toLocaleString()}`;
    const blob = new Blob([fileContent], { type: 'text/plain' });
    const blobUrl = URL.createObjectURL(blob);

    result.innerHTML = `
      <p class="text-green-600 font-medium mb-2">✅ File siap diunduh</p>
      <a href="${blobUrl}" download="hasil-download.txt"
         class="inline-block bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg">
         Unduh File
      </a>
    `;
  }, 2000);
});
</script>
</body>
</html>
