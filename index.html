<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<meta name="theme-color" content="#1c2138"/>
<meta name="description" content="Romaps — peta interaktif dengan pencarian tempat, rute real-time, tempat di sekitar, dan alat ukur jarak."/>
<title>Romaps — Peta &amp; Navigasi</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Ccircle cx='12' cy='12' r='11' fill='%231c2138'/%3E%3Cpath d='M12 12 15.5 7 12.8 12 15.5 17Z' fill='%23dba94e'/%3E%3Cpath d='M12 12 8.5 17 11.2 12 8.5 7Z' fill='%23dba94e' opacity='.45'/%3E%3C/svg%3E"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet"/>
<style>
/* ══════════════════════════════════════
   RESET & TOKENS
   Cartography-inspired: deep ink, warm
   parchment surfaces, a single brass
   accent (the "instrument" colour) and
   a quiet teal for transit/secondary use.
══════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:    #1c2138;
  --ink2:   #454b66;
  --muted:  #71768f;
  --paper:  #faf8f2;
  --paper2: #f0ead9;
  --line:   rgba(28,33,56,.09);
  --brass:  #b8852f;
  --brass2: #966c20;
  --brass-soft: rgba(184,133,47,.15);
  --teal:   #1f6f6b;
  --teal-soft: rgba(31,111,107,.15);
  --danger: #b5402b;
  --glass:  rgba(250,248,242,.86);
  --glass-dark: rgba(20,23,38,.80);
  --blur:   blur(20px) saturate(160%);
  --r-pill: 999px;
  --r-card: 22px;
  --shadow-sm: 0 2px 10px rgba(28,33,56,.10);
  --shadow-md: 0 6px 28px rgba(28,33,56,.16);
  --shadow-lg: 0 12px 44px rgba(28,33,56,.24);
  --transition: .18s cubic-bezier(.4,0,.2,1);
  --font-display:'Fraunces',Georgia,serif;
  --font-body:'Inter',system-ui,sans-serif;
  --font-mono:'IBM Plex Mono',ui-monospace,monospace;
}
body.dark{
  --ink:    #f1efe6;
  --ink2:   #cdd1e2;
  --muted:  #8d92ab;
  --paper:  #161a2c;
  --paper2: #1f2438;
  --line:   rgba(255,255,255,.08);
  --brass:  #dba94e;
  --brass2: #c4922f;
  --brass-soft: rgba(219,169,78,.18);
  --teal:   #45a59e;
  --teal-soft: rgba(69,165,158,.18);
  --glass:  rgba(22,26,44,.80);
  --glass-dark: rgba(8,9,18,.86);
  --shadow-sm: 0 2px 10px rgba(0,0,0,.30);
  --shadow-md: 0 6px 28px rgba(0,0,0,.40);
  --shadow-lg: 0 12px 44px rgba(0,0,0,.50);
}
body{font-family:var(--font-body);overflow:hidden;background:var(--ink);transition:background var(--transition)}
#map{width:100vw;height:100vh;background:#cfd6e0}
body.dark #map{background:#0c0e18}
*:focus-visible{outline:2px solid var(--brass);outline-offset:2px;border-radius:6px}
@media (prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.001ms!important;transition:none!important}}

@keyframes rise-in{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* ══════════════════════════════════════
   BRAND
══════════════════════════════════════ */
.brand-row{display:flex;align-items:center;gap:8px;padding:2px 4px 8px 6px;color:var(--ink);user-select:none}
.brand-mark{flex-shrink:0;color:var(--brass)}
.brand-name{font-family:var(--font-display);font-weight:600;font-size:17px;letter-spacing:.01em;color:var(--ink)}
@media (max-width:420px){.brand-name{display:none}}

/* ══════════════════════════════════════
   TOP-LEFT: SEARCH
══════════════════════════════════════ */
#search-wrap{
  position:fixed;top:16px;left:16px;z-index:900;
  width:min(380px,calc(100vw - 88px));
  display:flex;flex-direction:column;gap:8px;
  animation:rise-in .5s cubic-bezier(.2,.8,.2,1) both;
}

#search-bar{
  position:relative;
  background:var(--glass);
  backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);
  border-radius:var(--r-pill);
  box-shadow:var(--shadow-md);
  display:flex;align-items:center;
  height:52px;padding:0 8px 0 6px;
  border:1px solid var(--line);
  transition:box-shadow var(--transition);
}
#search-bar:focus-within{box-shadow:0 0 0 2px var(--brass),var(--shadow-md)}

.sb-menu{
  background:none;border:none;cursor:pointer;
  color:var(--ink2);padding:8px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  margin-right:2px;transition:background var(--transition);
}
.sb-menu:hover{background:rgba(0,0,0,.06)}

#search-input{
  flex:1;border:none;outline:none;background:transparent;
  font-family:var(--font-body);font-size:15px;font-weight:400;color:var(--ink);
}
#search-input::placeholder{color:var(--muted)}

#search-go{
  width:38px;height:38px;border-radius:var(--r-pill);border:none;
  background:var(--brass);color:#fff;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background var(--transition),transform var(--transition);flex-shrink:0;
}
#search-go:hover{background:var(--brass2);transform:scale(1.05)}

/* CHIPS */
#chips{display:flex;gap:6px;padding-left:2px;flex-wrap:nowrap;overflow-x:auto}
#chips::-webkit-scrollbar{display:none}
.chip{
  white-space:nowrap;
  background:var(--glass);
  backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);
  border:1px solid var(--line);
  border-radius:var(--r-pill);
  box-shadow:var(--shadow-sm);
  padding:7px 14px;
  font-family:var(--font-body);font-size:12px;font-weight:500;
  color:var(--ink2);cursor:pointer;
  display:flex;align-items:center;gap:5px;
  transition:background var(--transition),color var(--transition),border-color var(--transition);
}
.chip:hover{background:var(--paper)}
.chip.on{background:var(--brass);color:#fff;border-color:var(--brass)}
.chip[data-key="measure"].on{background:var(--ink);border-color:var(--ink)}

/* SUGGESTIONS — floats over chips, doesn't push layout */
#suggestions{
  position:absolute;top:60px;left:0;right:0;z-index:5;
  background:var(--glass);
  backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);
  border:1px solid var(--line);
  border-radius:16px;box-shadow:var(--shadow-md);
  overflow:hidden;display:none;max-height:60vh;overflow-y:auto;
}
.sg-item{
  display:flex;align-items:center;gap:12px;
  padding:11px 16px;cursor:pointer;
  transition:background var(--transition);
}
.sg-item:hover{background:rgba(0,0,0,.04)}
.sg-item+.sg-item{border-top:1px solid var(--line)}
.sg-ico{
  width:34px;height:34px;border-radius:10px;
  background:var(--brass-soft);
  display:flex;align-items:center;justify-content:center;
  font-size:16px;flex-shrink:0;
}
.sg-name{font-size:14px;font-weight:500;color:var(--ink)}
.sg-addr{font-size:12px;color:var(--muted);margin-top:1px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:260px}
.sg-empty{padding:18px 16px;font-size:13px;color:var(--muted);text-align:center}

/* ══════════════════════════════════════
   TOP-RIGHT: COMPASS + THEME TOGGLE
══════════════════════════════════════ */
#top-right-stack{
  position:fixed;top:16px;right:16px;z-index:900;
  display:flex;flex-direction:column;gap:8px;
  animation:rise-in .5s cubic-bezier(.2,.8,.2,1) .08s both;
}
.round-btn{
  width:48px;height:48px;border-radius:50%;border:none;
  background:var(--glass);
  backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);
  border:1px solid var(--line);
  box-shadow:var(--shadow-md);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  color:var(--brass);transition:box-shadow var(--transition),transform var(--transition);
}
.round-btn:hover{box-shadow:var(--shadow-lg)}
.round-btn:active{transform:scale(.94)}
#compass-needle{transition:transform .25s linear}
#theme-toggle{color:var(--ink2)}

/* ══════════════════════════════════════
   RIGHT-MIDDLE: ZOOM + LOCATE
══════════════════════════════════════ */
#right-ctrl{
  position:fixed;right:16px;top:50%;transform:translateY(-50%);
  z-index:900;display:flex;flex-direction:column;gap:8px;margin-top:-30px;
  animation:rise-in .5s cubic-bezier(.2,.8,.2,1) .14s both;
}
.ctrl-group{
  background:var(--glass);
  backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);
  border:1px solid var(--line);
  border-radius:14px;box-shadow:var(--shadow-md);
  overflow:hidden;display:flex;flex-direction:column;
}
.ctrl-btn{
  width:46px;height:46px;border:none;background:transparent;
  cursor:pointer;font-size:20px;font-weight:300;color:var(--ink2);
  display:flex;align-items:center;justify-content:center;
  transition:background var(--transition),color var(--transition);
}
.ctrl-btn:hover{background:rgba(0,0,0,.06);color:var(--ink)}
.ctrl-btn+.ctrl-btn{border-top:1px solid var(--line)}

#btn-locate{
  width:46px;height:46px;border-radius:14px;border:none;
  background:var(--glass);
  backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);
  border:1px solid var(--line);
  box-shadow:var(--shadow-md);
  cursor:pointer;color:var(--muted);
  display:flex;align-items:center;justify-content:center;
  transition:background var(--transition),color var(--transition),box-shadow var(--transition);
}
#btn-locate:hover{background:var(--paper);color:var(--brass)}
#btn-locate.on{color:var(--brass);box-shadow:0 0 0 2px var(--brass),var(--shadow-md)}

/* ══════════════════════════════════════
   BOTTOM-CENTER: LAYER PICKER
══════════════════════════════════════ */
#layer-bar{
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
  z-index:900;
  background:var(--glass);
  backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);
  border:1px solid var(--line);
  border-radius:var(--r-pill);box-shadow:var(--shadow-md);
  display:flex;align-items:center;gap:4px;padding:5px;
  animation:rise-in .5s cubic-bezier(.2,.8,.2,1) .2s both;
}
.lyr-btn{
  display:flex;align-items:center;gap:7px;
  padding:8px 16px;border-radius:var(--r-pill);border:none;
  background:transparent;cursor:pointer;
  font-family:var(--font-body);font-size:13px;font-weight:500;
  color:var(--muted);transition:background var(--transition),color var(--transition);
}
.lyr-btn:hover{background:rgba(0,0,0,.06);color:var(--ink)}
.lyr-btn.on{background:var(--ink);color:var(--paper)}
.lyr-btn .lico{font-size:15px}

/* ══════════════════════════════════════
   MEASURE PANEL
══════════════════════════════════════ */
#measure-panel{
  position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(8px);
  z-index:900;display:none;align-items:center;gap:10px;
  background:var(--ink);color:var(--paper);
  border-radius:var(--r-pill);box-shadow:var(--shadow-lg);
  padding:9px 8px 9px 16px;font-size:13px;
  opacity:0;transition:opacity .2s,transform .2s;
}
#measure-panel.show{display:flex;opacity:1;transform:translateX(-50%) translateY(0)}
#measure-value{font-family:var(--font-mono);font-weight:600;letter-spacing:.02em}
#measure-clear{
  background:rgba(255,255,255,.14);border:none;color:var(--paper);
  border-radius:var(--r-pill);padding:7px 13px;font-size:12px;font-weight:500;
  cursor:pointer;font-family:var(--font-body);transition:background var(--transition);
}
#measure-clear:hover{background:rgba(255,255,255,.24)}

/* ══════════════════════════════════════
   SIDE PANEL (menu): saved + recent
══════════════════════════════════════ */
#panel-backdrop{
  position:fixed;inset:0;z-index:920;background:rgba(10,12,22,.42);
  opacity:0;pointer-events:none;transition:opacity var(--transition);
}
#panel-backdrop.show{opacity:1;pointer-events:auto}
#side-panel{
  position:fixed;top:0;left:0;bottom:0;z-index:930;
  width:min(320px,86vw);
  background:var(--paper);color:var(--ink);
  box-shadow:var(--shadow-lg);
  transform:translateX(-100%);
  transition:transform .3s cubic-bezier(.32,0,.25,1);
  display:flex;flex-direction:column;
}
#side-panel.open{transform:translateX(0)}
.panel-head{display:flex;align-items:center;justify-content:space-between;padding:18px 18px 12px}
.panel-head .brand-row{padding:0}
#panel-close{
  width:32px;height:32px;border-radius:50%;border:none;background:var(--paper2);
  color:var(--muted);cursor:pointer;font-size:15px;
  display:flex;align-items:center;justify-content:center;transition:background var(--transition);
}
#panel-close:hover{background:var(--line)}
.panel-scroll{overflow-y:auto;flex:1;padding-bottom:20px}
.panel-section{padding:14px 18px 4px}
.panel-label{
  font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;
  color:var(--muted);margin-bottom:8px;
}
.panel-list{display:flex;flex-direction:column;gap:2px}
.pl-item{
  display:flex;align-items:center;gap:12px;padding:9px 8px;border-radius:12px;cursor:pointer;
  transition:background var(--transition);
}
.pl-item:hover{background:var(--paper2)}
.pl-ico{width:30px;height:30px;border-radius:9px;background:var(--brass-soft);
  display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.pl-name{font-size:13.5px;font-weight:500;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pl-remove{
  margin-left:auto;background:none;border:none;color:var(--muted);cursor:pointer;
  font-size:13px;padding:4px 6px;border-radius:8px;flex-shrink:0;
}
.pl-remove:hover{background:var(--line);color:var(--danger)}
.pl-empty{font-size:12.5px;color:var(--muted);padding:6px 8px}

/* ══════════════════════════════════════
   BOTTOM SHEET
══════════════════════════════════════ */
#info-sheet{
  position:fixed;bottom:0;left:0;right:0;z-index:910;
  background:var(--paper);color:var(--ink);
  border-radius:24px 24px 0 0;
  box-shadow:0 -4px 32px rgba(0,0,0,.20);
  padding:0 0 env(safe-area-inset-bottom,12px);
  transform:translateY(100%);
  transition:transform .32s cubic-bezier(.32,0,.25,1);
  max-height:80vh;
}
#info-sheet.open{transform:translateY(0)}

.sheet-drag{width:40px;height:4px;border-radius:2px;background:var(--line);margin:12px auto 14px}
.sheet-body{padding:0 20px 20px;overflow-y:auto;max-height:74vh}

.sheet-top{display:flex;align-items:flex-start;gap:12px;margin-bottom:10px}
.sheet-cat{
  width:38px;height:38px;border-radius:12px;background:var(--brass-soft);
  display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;margin-top:1px;
}
.sheet-name{font-family:var(--font-display);font-size:19px;font-weight:600;color:var(--ink);line-height:1.25}
.sheet-addr{font-size:13px;color:var(--muted);line-height:1.5;margin-top:2px}

.sheet-coords{
  display:inline-flex;align-items:center;gap:6px;
  background:var(--paper2);border-radius:8px;padding:5px 10px;
  font-family:var(--font-mono);font-size:12px;font-weight:500;color:var(--ink2);
  margin-bottom:16px;color:var(--brass2);
}

.act-btn{
  width:100%;height:46px;border-radius:13px;border:none;
  font-family:var(--font-body);font-size:14.5px;font-weight:600;
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;
  transition:filter var(--transition),transform var(--transition);margin-bottom:10px;
}
.act-btn:hover{filter:brightness(1.06);transform:translateY(-1px)}
.act-btn:active{transform:translateY(0)}
.act-primary{background:var(--brass);color:#fff}

.act-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.act-icon{
  display:flex;flex-direction:column;align-items:center;gap:4px;
  padding:10px 4px;border-radius:13px;border:none;background:var(--paper2);color:var(--ink2);
  font-family:var(--font-body);font-size:11.5px;font-weight:500;cursor:pointer;
  transition:background var(--transition);
}
.act-icon:hover{background:var(--line)}
.act-icon .ai-ic{font-size:17px;line-height:1}
.act-icon.saved{color:var(--brass2)}

/* ROUTE MODE */
.route-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.route-dest{font-family:var(--font-display);font-size:17px;font-weight:600;color:var(--ink)}
.route-clear{
  background:var(--paper2);border:none;border-radius:var(--r-pill);
  padding:7px 13px;font-size:12px;font-weight:600;color:var(--ink2);cursor:pointer;
  transition:background var(--transition);
}
.route-clear:hover{background:var(--line)}
.route-stats{display:flex;align-items:baseline;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.route-dur{font-family:var(--font-display);font-size:22px;font-weight:700;color:var(--brass2)}
.route-km{font-family:var(--font-mono);font-size:14px;font-weight:600;color:var(--ink2)}
.route-dot{color:var(--muted)}
.route-mode-tag{font-size:12px;color:var(--muted);margin-left:auto}
.route-steps{display:flex;flex-direction:column;gap:2px;max-height:42vh;overflow-y:auto;
  border-top:1px solid var(--line);padding-top:10px}
.step-item{display:flex;align-items:flex-start;gap:11px;padding:8px 2px}
.step-ic{
  width:26px;height:26px;border-radius:50%;background:var(--paper2);color:var(--brass2);
  display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;margin-top:1px;
}
.step-text{font-size:13.5px;color:var(--ink);line-height:1.4}
.step-dist{font-family:var(--font-mono);font-size:11px;color:var(--muted);margin-top:1px}

#sheet-close{
  position:absolute;top:12px;right:16px;
  width:30px;height:30px;border-radius:50%;border:none;
  background:var(--paper2);cursor:pointer;color:var(--muted);
  display:flex;align-items:center;justify-content:center;font-size:16px;
  transition:background var(--transition);
}
#sheet-close:hover{background:var(--line);color:var(--ink)}

/* ══════════════════════════════════════
   TOAST
══════════════════════════════════════ */
#toast{
  position:fixed;top:80px;left:50%;transform:translateX(-50%) translateY(-8px);
  z-index:999;
  background:var(--glass-dark);
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  color:#fff;border-radius:var(--r-pill);
  padding:10px 20px;font-size:13px;font-weight:500;
  white-space:nowrap;pointer-events:none;
  opacity:0;transition:opacity .2s,transform .2s;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ══════════════════════════════════════
   STATUS
══════════════════════════════════════ */
#status{
  position:fixed;bottom:80px;right:16px;z-index:900;
  background:var(--glass-dark);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  color:#e9e7dc;border-radius:10px;
  padding:7px 12px;font-size:11px;font-weight:500;font-family:var(--font-mono);
  display:none;max-width:220px;text-align:right;
  border:1px solid rgba(255,255,255,.1);
}

/* ══════════════════════════════════════
   PINS & PULSE MARKER
══════════════════════════════════════ */
@keyframes pulse-out{0%{transform:scale(.5);opacity:.9}100%{transform:scale(2.8);opacity:0}}
.p-wrap{position:relative;width:18px;height:18px}
.p-ring{position:absolute;top:50%;left:50%;width:18px;height:18px;background:var(--brass-soft);
  border-radius:50%;transform:translate(-50%,-50%);animation:pulse-out 2s ease-out infinite}
.p-dot{width:18px;height:18px;background:var(--brass);border-radius:50%;border:2.5px solid #fff;
  box-shadow:0 0 0 3px rgba(184,133,47,.35)}

.pin-mark{position:relative;width:34px;height:44px;filter:drop-shadow(0 3px 5px rgba(0,0,0,.3))}
.pin-mark.sm{width:24px;height:31px;filter:drop-shadow(0 2px 4px rgba(0,0,0,.28))}
.pin-emoji{position:absolute;top:8px;left:0;width:34px;text-align:center;font-size:15px;line-height:1}
.pin-emoji.sm{top:5px;width:24px;font-size:11px}

/* LEAFLET OVERRIDES */
.leaflet-control-scale{margin:0 0 80px 16px!important}
.leaflet-control-scale-line{
  background:var(--glass)!important;border-color:var(--ink2)!important;color:var(--ink2)!important;
  backdrop-filter:var(--blur);border-radius:4px!important;font-family:var(--font-mono)!important;
}
.leaflet-control-attribution{
  background:var(--glass)!important;backdrop-filter:var(--blur);
  border-radius:8px 0 0 0!important;font-size:10px!important;color:var(--muted)!important;
}
.leaflet-control-attribution a{color:var(--ink2)!important}
.leaflet-popup-content-wrapper{border-radius:14px!important;box-shadow:var(--shadow-lg)!important;font-family:var(--font-body)!important}
.leaflet-popup-content{margin:12px 16px!important;font-size:13px!important}
.leaflet-popup-tip-container{display:none}
path.route-path{filter:drop-shadow(0 2px 5px rgba(0,0,0,.3))}

::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(0,0,0,.2);border-radius:2px}
</style>
</head>
<body>

<div id="map"></div>

<!-- ── SEARCH ── -->
<div id="search-wrap">
  <div class="brand-row">
    <svg class="brand-mark" width="22" height="22" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9.5" fill="none" stroke="currentColor" stroke-width="1.5"/><path d="M12 12 15.5 7 12.8 12 15.5 17Z" fill="currentColor"/><path d="M12 12 8.5 17 11.2 12 8.5 7Z" fill="currentColor" opacity=".4"/></svg>
    <span class="brand-name">Romaps</span>
  </div>
  <div id="search-bar">
    <button class="sb-menu" id="menu-btn" aria-label="Menu">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>
    <input id="search-input" type="text" placeholder="Cari tempat, alamat…" autocomplete="off"/>
    <button id="search-go" aria-label="Cari">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
    </button>
    <div id="suggestions"></div>
  </div>
  <div id="chips">
    <button class="chip" data-key="transit">🚇 Transit</button>
    <button class="chip" data-key="food">🍜 Makan</button>
    <button class="chip" data-key="hotel">🏨 Hotel</button>
    <button class="chip" data-key="measure">📏 Ukur jarak</button>
  </div>
</div>

<!-- ── COMPASS + THEME ── -->
<div id="top-right-stack">
  <button class="round-btn" id="compass" title="Kompas" aria-label="Kompas">
    <svg id="compass-needle" width="22" height="22" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9.5" fill="none" stroke="currentColor" stroke-width="1.5" opacity=".5"/><path d="M12 12 15.5 7 12.8 12 15.5 17Z" fill="currentColor"/><path d="M12 12 8.5 17 11.2 12 8.5 7Z" fill="currentColor" opacity=".4"/></svg>
  </button>
  <button class="round-btn" id="theme-toggle" title="Tema gelap/terang" aria-label="Ganti tema">
    <svg id="theme-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="4.5"/><path d="M12 2.5v2.2M12 19.3v2.2M4.2 4.2l1.6 1.6M18.2 18.2l1.6 1.6M2.5 12h2.2M19.3 12h2.2M4.2 19.8l1.6-1.6M18.2 5.8l1.6-1.6"/>
    </svg>
  </button>
</div>

<!-- ── RIGHT CONTROLS ── -->
<div id="right-ctrl">
  <div class="ctrl-group">
    <button class="ctrl-btn" id="btn-zi" title="Perbesar" aria-label="Perbesar">+</button>
    <button class="ctrl-btn" id="btn-zo" title="Perkecil" aria-label="Perkecil">−</button>
  </div>
  <button id="btn-locate" title="Lokasi saya" aria-label="Lokasi saya">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="3"/>
      <path d="M12 2v2.5M12 19.5V22M2 12h2.5M19.5 12H22"/>
      <circle cx="12" cy="12" r="7" stroke-opacity=".3"/>
    </svg>
  </button>
</div>

<!-- ── LAYER BAR ── -->
<div id="layer-bar">
  <button class="lyr-btn on" data-layer="map"><span class="lico">🗺️</span>Peta</button>
  <button class="lyr-btn" data-layer="sat"><span class="lico">🛰️</span>Satelit</button>
  <button class="lyr-btn" data-layer="terrain"><span class="lico">⛰️</span>Topografi</button>
</div>

<!-- ── MEASURE PANEL ── -->
<div id="measure-panel">
  <span>📏 Jarak: <span id="measure-value">0 m</span></span>
  <button id="measure-clear">Hapus</button>
</div>

<!-- ── SIDE PANEL ── -->
<div id="panel-backdrop"></div>
<div id="side-panel">
  <div class="panel-head">
    <div class="brand-row">
      <svg class="brand-mark" width="22" height="22" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9.5" fill="none" stroke="currentColor" stroke-width="1.5"/><path d="M12 12 15.5 7 12.8 12 15.5 17Z" fill="currentColor"/><path d="M12 12 8.5 17 11.2 12 8.5 7Z" fill="currentColor" opacity=".4"/></svg>
      <span class="brand-name" style="display:inline">Romaps</span>
    </div>
    <button id="panel-close" aria-label="Tutup menu">✕</button>
  </div>
  <div class="panel-scroll">
    <div class="panel-section">
      <div class="panel-label">Tersimpan</div>
      <div id="panel-saved" class="panel-list"></div>
    </div>
    <div class="panel-section">
      <div class="panel-label">Riwayat pencarian</div>
      <div id="panel-recents" class="panel-list"></div>
    </div>
  </div>
</div>

<!-- ── INFO BOTTOM SHEET ── -->
<div id="info-sheet">
  <button id="sheet-close" aria-label="Tutup">✕</button>
  <div class="sheet-drag"></div>
  <div class="sheet-body" id="sheet-body"></div>
</div>

<!-- ── TOAST / STATUS ── -->
<div id="toast"></div>
<div id="status"></div>

<script>
/* ═══════════════════════════════════
   TILES — light/dark variants per layer
═══════════════════════════════════ */
const TILES = {
  map:{
    light:{url:'https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',sub:'abcd'},
    dark: {url:'https://{s}.basemaps.cartocdn.com/rastertiles/dark_all/{z}/{x}/{y}{r}.png',sub:'abcd'},
    attr:'© OpenStreetMap contributors © CARTO'
  },
  sat:{
    light:{url:'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'},
    attr:'© Esri, Maxar, Earthstar Geographics'
  },
  terrain:{
    light:{url:'https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png',sub:'abc'},
    attr:'© OpenTopoMap (CC-BY-SA) © OpenStreetMap contributors'
  }
};

let theme='light';
let currentLayerKey='map';

const map = L.map('map',{center:[-6.2088,106.8456],zoom:13,zoomControl:false});
let tile = addTile(currentLayerKey);
L.control.scale({imperial:false,position:'bottomleft'}).addTo(map);

function addTile(key){
  const t = TILES[key];
  const variant = (theme==='dark' && t.dark) ? t.dark : t.light;
  return L.tileLayer(variant.url,{
    attribution:t.attr,subdomains:variant.sub||'abc',
    maxZoom:key==='terrain'?17:19
  }).addTo(map);
}

document.querySelectorAll('.lyr-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.lyr-btn').forEach(b=>b.classList.remove('on'));
    btn.classList.add('on');
    currentLayerKey = btn.dataset.layer;
    map.removeLayer(tile);
    tile = addTile(currentLayerKey);
    tile.bringToBack();
  });
});

/* ═══════════════════════════════════
   THEME TOGGLE
═══════════════════════════════════ */
document.getElementById('theme-toggle').addEventListener('click',()=>{
  theme = theme==='dark' ? 'light' : 'dark';
  document.body.classList.toggle('dark', theme==='dark');
  map.removeLayer(tile);
  tile = addTile(currentLayerKey);
  tile.bringToBack();
  document.getElementById('theme-icon').innerHTML = theme==='dark'
    ? '<path d="M21 12.8A9 9 0 1111.2 3a7 7 0 009.8 9.8z" fill="currentColor" stroke="none"/>'
    : '<circle cx="12" cy="12" r="4.5"/><path d="M12 2.5v2.2M12 19.3v2.2M4.2 4.2l1.6 1.6M18.2 18.2l1.6 1.6M2.5 12h2.2M19.3 12h2.2M4.2 19.8l1.6-1.6M18.2 5.8l1.6-1.6"/>';
});

/* ═══════════════════════════════════
   ZOOM
═══════════════════════════════════ */
document.getElementById('btn-zi').addEventListener('click',()=>map.zoomIn());
document.getElementById('btn-zo').addEventListener('click',()=>map.zoomOut());

/* ═══════════════════════════════════
   REAL-TIME LOCATION
═══════════════════════════════════ */
let uMarker=null,uCircle=null,tracking=false,watchId=null,lastPos=null;

const pulseIcon = L.divIcon({
  className:'',
  html:`<div class="p-wrap"><div class="p-ring"></div><div class="p-dot"></div></div>`,
  iconSize:[18,18],iconAnchor:[9,9]
});

function startTracking(){
  if(!navigator.geolocation){toast('Geolokasi tidak didukung');return}
  tracking=true;
  document.getElementById('btn-locate').classList.add('on');
  toast('Mencari lokasi…');
  watchId=navigator.geolocation.watchPosition(p=>{
    const{latitude:lat,longitude:lng,accuracy:acc}=p.coords;
    lastPos={lat,lng};
    if(!uMarker){
      uMarker=L.marker([lat,lng],{icon:pulseIcon,zIndexOffset:1000}).addTo(map);
      uCircle=L.circle([lat,lng],{radius:acc,color:'#b8852f',fillColor:'#b8852f',fillOpacity:.08,weight:1.2}).addTo(map);
      map.setView([lat,lng],15);
    }else{uMarker.setLatLng([lat,lng]);uCircle.setLatLng([lat,lng]).setRadius(acc)}
    updateStatus(`${lat.toFixed(5)}, ${lng.toFixed(5)}\n±${Math.round(acc)} m`);
    toast('Lokasi ditemukan ✓');
  },err=>{
    const m={1:'Akses ditolak',2:'Sinyal lemah',3:'Timeout'};
    toast(m[err.code]||'Error lokasi');
    stopTracking();
  },{enableHighAccuracy:true,timeout:15000,maximumAge:2000});
}

function stopTracking(){
  tracking=false;
  document.getElementById('btn-locate').classList.remove('on');
  if(watchId!==null){navigator.geolocation.clearWatch(watchId);watchId=null}
  document.getElementById('status').style.display='none';
}

document.getElementById('btn-locate').addEventListener('click',()=>{
  tracking?stopTracking():startTracking();
});

setInterval(()=>{
  if(tracking&&lastPos){
    const t=new Date().toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
    updateStatus(`${lastPos.lat.toFixed(5)}, ${lastPos.lng.toFixed(5)}\n${t}`);
  }
},1000);

function getCurrentPositionOnce(){
  return new Promise((res,rej)=>{
    if(!navigator.geolocation) return rej(new Error('no-geo'));
    navigator.geolocation.getCurrentPosition(
      p=>res({lat:p.coords.latitude,lng:p.coords.longitude}),
      ()=>rej(new Error('denied')),
      {enableHighAccuracy:true,timeout:8000}
    );
  });
}

/* ═══════════════════════════════════
   COMPASS — real device heading if available
═══════════════════════════════════ */
let headingActive=false;
function onOrientation(e){
  let heading = e.webkitCompassHeading!=null ? e.webkitCompassHeading : (e.alpha!=null ? (360-e.alpha) : null);
  if(heading==null) return;
  document.getElementById('compass-needle').style.transform = `rotate(${heading}deg)`;
}
document.getElementById('compass').addEventListener('click', async ()=>{
  if(headingActive){toast('Kompas aktif — putar perangkat Anda');return}
  if(!('ondeviceorientation' in window) && !('ondeviceorientationabsolute' in window)){
    toast('Arah: Utara ↑ (kompas tidak didukung perangkat ini)');return;
  }
  if(typeof DeviceOrientationEvent!=='undefined' && typeof DeviceOrientationEvent.requestPermission==='function'){
    try{
      const perm = await DeviceOrientationEvent.requestPermission();
      if(perm!=='granted'){toast('Izin kompas ditolak');return}
    }catch{toast('Arah: Utara ↑');return}
  }
  window.addEventListener('deviceorientationabsolute', onOrientation, true);
  window.addEventListener('deviceorientation', onOrientation, true);
  headingActive=true;
  toast('Kompas aktif');
});

/* ═══════════════════════════════════
   CATEGORY HELPERS
═══════════════════════════════════ */
function getEmoji(t){
  t = t||'';
  const m={restaurant:'🍽️',cafe:'☕',school:'🏫',university:'🎓',hospital:'🏥',clinic:'🩺',
    hotel:'🏨',guest_house:'🏨',park:'🌳',mosque:'🕌',church:'⛪',temple:'🛕',bank:'🏦',atm:'🏦',
    supermarket:'🛒',mall:'🏬',airport:'✈️',station:'🚉',bus:'🚌',fuel:'⛽',pharmacy:'💊',museum:'🏛️'};
  for(const k of Object.keys(m)) if(t.includes(k)) return m[k];
  return '📍';
}

/* ═══════════════════════════════════
   FAVORITES & RECENTS (in-memory only)
═══════════════════════════════════ */
let favorites=[];
let recents=[];

function closeEnough(a,lat,lng){return Math.abs(a.lat-lat)<1e-5 && Math.abs(a.lng-lng)<1e-5}
function isFavorite(lat,lng){return favorites.some(f=>closeEnough(f,lat,lng))}

function toggleFavorite(name,lat,lng){
  const idx=favorites.findIndex(f=>closeEnough(f,lat,lng));
  if(idx>-1){favorites.splice(idx,1);toast('Dihapus dari tersimpan')}
  else{favorites.unshift({name,lat,lng});toast('Tempat disimpan ✓')}
  renderPanelLists();
}

function pushRecent(name,lat,lng){
  recents = recents.filter(r=>r.name!==name);
  recents.unshift({name,lat,lng});
  if(recents.length>8) recents.pop();
  renderPanelLists();
}

function renderPanelLists(){
  const savedEl=document.getElementById('panel-saved');
  const recEl=document.getElementById('panel-recents');
  savedEl.innerHTML = favorites.length ? favorites.map((f,i)=>`
    <div class="pl-item" onclick="flyToSaved(${i})">
      <div class="pl-ico">⭐</div><div class="pl-name">${escapeHtml(f.name)}</div>
      <button class="pl-remove" onclick="event.stopPropagation();removeFavorite(${i})">✕</button>
    </div>`).join('') : '<div class="pl-empty">Belum ada tempat tersimpan</div>';
  recEl.innerHTML = recents.length ? recents.map((r,i)=>`
    <div class="pl-item" onclick="flyToRecent(${i})">
      <div class="pl-ico">🕒</div><div class="pl-name">${escapeHtml(r.name)}</div>
    </div>`).join('') : '<div class="pl-empty">Belum ada pencarian</div>';
}
function flyToSaved(i){const f=favorites[i];closeSidePanel();placeResult(f.lat,f.lng,f.name,f.name)}
function flyToRecent(i){const r=recents[i];closeSidePanel();placeResult(r.lat,r.lng,r.name,r.name)}
function removeFavorite(i){favorites.splice(i,1);renderPanelLists()}

function escapeHtml(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}

/* ═══════════════════════════════════
   SIDE PANEL OPEN/CLOSE
═══════════════════════════════════ */
function openSidePanel(){
  renderPanelLists();
  document.getElementById('side-panel').classList.add('open');
  document.getElementById('panel-backdrop').classList.add('show');
}
function closeSidePanel(){
  document.getElementById('side-panel').classList.remove('open');
  document.getElementById('panel-backdrop').classList.remove('show');
}
document.getElementById('menu-btn').addEventListener('click',openSidePanel);
document.getElementById('panel-close').addEventListener('click',closeSidePanel);
document.getElementById('panel-backdrop').addEventListener('click',closeSidePanel);
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){closeSidePanel();sugg.style.display='none'}
});

/* ═══════════════════════════════════
   SEARCH / GEOCODE
═══════════════════════════════════ */
const inp  = document.getElementById('search-input');
const sugg = document.getElementById('suggestions');
let sgTimer;

inp.addEventListener('input',()=>{
  clearTimeout(sgTimer);
  const q=inp.value.trim();
  if(q.length<2){
    if(recents.length) renderRecentSuggestions(); else sugg.style.display='none';
    return;
  }
  sgTimer=setTimeout(()=>fetchSugg(q),360);
});

inp.addEventListener('focus',()=>{
  if(!inp.value.trim() && recents.length) renderRecentSuggestions();
});

inp.addEventListener('keydown',e=>{
  if(e.key==='Enter'){clearTimeout(sgTimer);doSearch(inp.value.trim())}
  if(e.key==='Escape'){sugg.style.display='none'}
});

document.getElementById('search-go').addEventListener('click',()=>doSearch(inp.value.trim()));

function renderRecentSuggestions(){
  sugg.innerHTML = `<div class="sg-item" style="cursor:default" onclick="event.stopPropagation()"><div class="sg-ico">🕒</div><div class="sg-name" style="color:var(--muted);font-weight:600;font-size:11px;letter-spacing:.04em;text-transform:uppercase">Pencarian terbaru</div></div>` +
    recents.map(r=>`<div class="sg-item" data-lat="${r.lat}" data-lng="${r.lng}" data-name="${escapeHtml(r.name)}" data-full="${escapeHtml(r.name)}"><div class="sg-ico">🕒</div><div><div class="sg-name">${escapeHtml(r.name)}</div></div></div>`).join('');
  sugg.style.display='block';
  wireSuggItems();
}

async function fetchSugg(q){
  try{
    const r=await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(q)}&limit=5`,{headers:{'Accept-Language':'id'}});
    const d=await r.json();
    renderSugg(d);
  }catch{sugg.style.display='none'}
}

function renderSugg(items){
  if(!items.length){sugg.innerHTML='<div class="sg-empty">Tidak ada hasil</div>';sugg.style.display='block';return}
  sugg.innerHTML=items.map(it=>{
    const p=it.display_name.split(',');
    const name=p[0].trim();
    const addr=p.slice(1,3).join(',').trim();
    const ico=getEmoji((it.type||it.class||'').toLowerCase());
    return `<div class="sg-item"
      data-lat="${it.lat}" data-lng="${it.lon}"
      data-name="${escapeHtml(name)}" data-full="${escapeHtml(it.display_name)}">
      <div class="sg-ico">${ico}</div>
      <div>
        <div class="sg-name">${escapeHtml(name)}</div>
        <div class="sg-addr">${escapeHtml(addr)}</div>
      </div>
    </div>`;
  }).join('');
  sugg.style.display='block';
  wireSuggItems();
}

function wireSuggItems(){
  sugg.querySelectorAll('.sg-item[data-lat]').forEach(el=>{
    el.addEventListener('click',()=>{
      inp.value=el.dataset.name;
      sugg.style.display='none';
      placeResult(+el.dataset.lat,+el.dataset.lng,el.dataset.name,el.dataset.full);
      pushRecent(el.dataset.name,+el.dataset.lat,+el.dataset.lng);
    });
  });
}

async function doSearch(q){
  if(!q)return;
  sugg.style.display='none';
  toast('Mencari "'+q+'"…');
  try{
    const r=await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(q)}&limit=1`,{headers:{'Accept-Language':'id'}});
    const d=await r.json();
    if(!d.length){toast('Lokasi tidak ditemukan');return}
    const it=d[0];
    const name=it.display_name.split(',')[0].trim();
    inp.value=name;
    placeResult(+it.lat,+it.lon,name,it.display_name);
    pushRecent(name,+it.lat,+it.lon);
  }catch{toast('Koneksi gagal')}
}

document.addEventListener('click',e=>{
  if(!document.getElementById('search-wrap').contains(e.target))
    sugg.style.display='none';
});

/* ═══════════════════════════════════
   PIN ICONS
═══════════════════════════════════ */
function pinIcon(emoji){
  return L.divIcon({
    className:'',
    html:`<div class="pin-mark"><svg width="34" height="44" viewBox="0 0 34 44"><path d="M17 0C7.6 0 0 7.6 0 17c0 11 17 27 17 27s17-16 17-27C34 7.6 26.4 0 17 0z" fill="#b8852f"/><circle cx="17" cy="17" r="9" fill="#faf8f2"/></svg><span class="pin-emoji">${emoji||'📍'}</span></div>`,
    iconSize:[34,44],iconAnchor:[17,42],popupAnchor:[0,-38]
  });
}
const POI_STYLE = {
  transit:{color:'#4f6fa6',emoji:'🚇',label:'Transit'},
  food:{color:'#c4622d',emoji:'🍽️',label:'Tempat makan'},
  hotel:{color:'#3f8f7a',emoji:'🏨',label:'Hotel'}
};
function poiIcon(key){
  const s=POI_STYLE[key];
  return L.divIcon({
    className:'',
    html:`<div class="pin-mark sm"><svg width="24" height="31" viewBox="0 0 34 44"><path d="M17 0C7.6 0 0 7.6 0 17c0 11 17 27 17 27s17-16 17-27C34 7.6 26.4 0 17 0z" fill="${s.color}"/><circle cx="17" cy="17" r="9" fill="#fff"/></svg><span class="pin-emoji sm">${s.emoji}</span></div>`,
    iconSize:[24,31],iconAnchor:[12,30],popupAnchor:[0,-26]
  });
}

/* ═══════════════════════════════════
   PLACE RESULT + BOTTOM SHEET
═══════════════════════════════════ */
let pinMarker=null;
let currentPlace=null;

function placeResult(lat,lng,name,full,fly=true){
  if(pinMarker)map.removeLayer(pinMarker);
  clearRoute();
  const cat=getEmoji((full||name||'').toLowerCase());
  pinMarker=L.marker([lat,lng],{icon:pinIcon(cat)}).addTo(map);
  if(fly) map.flyTo([lat,lng],Math.max(map.getZoom(),15),{duration:1.1});
  currentPlace={name,full:full||name,lat,lng,cat};
  showSheet(name,full||name,lat,lng,cat);
  toast('');
}

function showSheet(name,full,lat,lng,cat){
  const addr=full.split(',').slice(1,4).join(',').trim();
  const saved=isFavorite(lat,lng);
  document.getElementById('sheet-body').innerHTML=`
    <div class="sheet-top">
      <div class="sheet-cat">${cat||'📍'}</div>
      <div>
        <div class="sheet-name">${escapeHtml(name)}</div>
        <div class="sheet-addr">${escapeHtml(addr||full)}</div>
      </div>
    </div>
    <div class="sheet-coords">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/>
      </svg>
      ${lat.toFixed(6)}, ${lng.toFixed(6)}
    </div>
    <button class="act-btn act-primary" onclick="requestRoute()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="#fff"><path d="M22 12l-9-9v4.5C5.5 8 2 13 2 19c2-4.5 5.5-6.5 11-6.5V17l9-5z"/></svg>
      Rute ke sini
    </button>
    <div class="act-row">
      <button class="act-icon ${saved?'saved':''}" onclick="toggleFavoriteFromSheet()">
        <span class="ai-ic">${saved?'★':'☆'}</span><span>${saved?'Tersimpan':'Simpan'}</span>
      </button>
      <button class="act-icon" onclick="copyCoords(${lat},${lng})">
        <span class="ai-ic">⧉</span><span>Salin</span>
      </button>
      <button class="act-icon" onclick="openOSM(${lat},${lng})">
        <span class="ai-ic">↗</span><span>Buka</span>
      </button>
    </div>`;
  document.getElementById('info-sheet').classList.remove('route-mode');
  document.getElementById('info-sheet').classList.add('open');
}

function toggleFavoriteFromSheet(){
  if(!currentPlace) return;
  toggleFavorite(currentPlace.name,currentPlace.lat,currentPlace.lng);
  showSheet(currentPlace.name,currentPlace.full,currentPlace.lat,currentPlace.lng,currentPlace.cat);
}

document.getElementById('sheet-close').addEventListener('click',()=>{
  document.getElementById('info-sheet').classList.remove('open','route-mode');
  if(pinMarker){map.removeLayer(pinMarker);pinMarker=null}
  clearRoute();
  currentPlace=null;
  inp.value='';
});

function copyCoords(lat,lng){
  navigator.clipboard.writeText(`${lat}, ${lng}`).then(()=>toast('Koordinat disalin ✓'));
}
function openOSM(lat,lng){
  window.open(`https://www.openstreetmap.org/?mlat=${lat}&mlon=${lng}#map=15/${lat}/${lng}`,'_blank');
}
function openRoute(lat,lng){
  const origin = lastPos ? `${lastPos.lat},${lastPos.lng}` : '';
  window.open(`https://www.openstreetmap.org/directions?route=${origin};${lat},${lng}`,'_blank');
}

/* ═══════════════════════════════════
   ROUTING — OSRM (real route line + steps)
═══════════════════════════════════ */
let routeLine=null;

function fmtDist(m){return m<1000?`${Math.round(m)} m`:`${(m/1000).toFixed(1)} km`}
function fmtDur(s){const min=Math.round(s/60);if(min<60)return `${min} mnt`;const h=Math.floor(min/60),mm=min%60;return `${h} j ${mm} mnt`}

function maneuverText(step){
  const m=step.maneuver, type=m.type, mod=m.modifier, name=step.name||'';
  const dirs={uturn:'putar balik','sharp right':'belok tajam ke kanan',right:'belok kanan','slight right':'belok sedikit ke kanan',
    straight:'lurus','slight left':'belok sedikit ke kiri',left:'belok kiri','sharp left':'belok tajam ke kiri'};
  const dir=dirs[mod]||'';
  const cap=s=>s?s.charAt(0).toUpperCase()+s.slice(1):'';
  switch(type){
    case 'depart': return `Mulai perjalanan${name?' di '+name:''}`;
    case 'arrive': return 'Tiba di tujuan';
    case 'roundabout': case 'rotary': return `Masuk bundaran${name?', keluar di '+name:''}`;
    case 'merge': return `Bergabung${dir?' '+dir:''}${name?' ke '+name:''}`;
    case 'fork': return `Ambil jalur${dir?' '+dir:''}${name?' ke '+name:''}`;
    case 'end of road': return `${cap(dir)||'Belok'}${name?' ke '+name:''}`;
    case 'new name': case 'continue': return `Lanjutkan${name?' di '+name:''}`;
    default: return `${cap(dir)||'Lanjutkan'}${name?' ke '+name:''}`;
  }
}
function stepIcon(maneuver){
  const mod=maneuver.modifier;
  if(maneuver.type==='depart') return '●';
  if(maneuver.type==='arrive') return '🏁';
  if(maneuver.type==='roundabout'||maneuver.type==='rotary') return '↻';
  const arrows={uturn:'↶','sharp right':'↱',right:'↱','slight right':'↗',straight:'↑','slight left':'↖',left:'↰','sharp left':'↰'};
  return arrows[mod]||'↑';
}

async function requestRoute(){
  if(!currentPlace) return;
  const dest=currentPlace;
  let origin=lastPos;
  if(!origin){
    toast('Mengambil lokasi Anda…');
    try{ origin=await getCurrentPositionOnce() }
    catch{ toast('Aktifkan lokasi untuk melihat rute'); return; }
  }
  toast('Menghitung rute…');
  try{
    const url=`https://router.project-osrm.org/route/v1/driving/${origin.lng},${origin.lat};${dest.lng},${dest.lat}?overview=full&geometries=geojson&steps=true`;
    const ctrl=new AbortController();
    const tmo=setTimeout(()=>ctrl.abort(),12000);
    const r=await fetch(url,{signal:ctrl.signal});
    clearTimeout(tmo);
    const d=await r.json();
    if(d.code!=='Ok' || !d.routes || !d.routes.length) throw new Error('no-route');
    const route=d.routes[0];
    drawRoute(route.geometry.coordinates);
    showRouteSheet(dest.name,route.distance,route.duration,route.legs[0].steps);
    toast('');
  }catch{
    toast('Rute tidak tersedia — membuka di OSM');
    openRoute(dest.lat,dest.lng);
  }
}

function drawRoute(coords){
  if(routeLine) map.removeLayer(routeLine);
  const latlngs=coords.map(c=>[c[1],c[0]]);
  routeLine=L.polyline(latlngs,{color:'#b8852f',weight:5,opacity:.92,className:'route-path'}).addTo(map);
  map.fitBounds(routeLine.getBounds(),{padding:[70,70]});
}
function clearRoute(){
  if(routeLine){map.removeLayer(routeLine);routeLine=null}
}

function showRouteSheet(name,distance,duration,steps){
  const stepsHtml=steps.filter(s=>s.maneuver.type!=='arrive' || true).map(st=>`
    <div class="step-item">
      <div class="step-ic">${stepIcon(st.maneuver)}</div>
      <div>
        <div class="step-text">${escapeHtml(maneuverText(st))}</div>
        ${st.distance>5?`<div class="step-dist">${fmtDist(st.distance)}</div>`:''}
      </div>
    </div>`).join('');
  document.getElementById('sheet-body').innerHTML=`
    <div class="route-head">
      <div class="route-dest">Ke ${escapeHtml(name)}</div>
      <button class="route-clear" onclick="endRoute()">Selesai</button>
    </div>
    <div class="route-stats">
      <span class="route-dur">${fmtDur(duration)}</span>
      <span class="route-dot">·</span>
      <span class="route-km">${fmtDist(distance)}</span>
      <span class="route-mode-tag">🚗 Mobil</span>
    </div>
    <div class="route-steps">${stepsHtml}</div>`;
  document.getElementById('info-sheet').classList.add('open','route-mode');
}

function endRoute(){
  clearRoute();
  document.getElementById('info-sheet').classList.remove('route-mode');
  if(currentPlace) showSheet(currentPlace.name,currentPlace.full,currentPlace.lat,currentPlace.lng,currentPlace.cat);
  else document.getElementById('info-sheet').classList.remove('open');
}

/* ═══════════════════════════════════
   CLICK MAP → REVERSE GEOCODE (or measure point)
═══════════════════════════════════ */
map.on('click',async e=>{
  if(rulerMode){addMeasurePoint(e.latlng);return}
  const{lat,lng}=e.latlng;
  toast('Mencari alamat…');
  try{
    const r=await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`,{headers:{'Accept-Language':'id'}});
    const d=await r.json();
    const name=d.address?.road||d.address?.suburb||d.address?.city||d.name||'Titik di peta';
    inp.value=name;
    placeResult(lat,lng,name,d.display_name||`${lat.toFixed(5)}, ${lng.toFixed(5)}`,false);
  }catch{
    placeResult(lat,lng,'Titik di peta',`${lat.toFixed(5)}, ${lng.toFixed(5)}`,false);
  }
});

/* ═══════════════════════════════════
   MEASURE / RULER TOOL
═══════════════════════════════════ */
let rulerMode=false, measurePts=[], measureLine=null, measureMarkers=[];

function startRuler(){
  rulerMode=true;
  document.getElementById('measure-panel').classList.add('show');
  toast('Klik peta untuk mengukur jarak');
}
function stopRuler(){
  rulerMode=false;
  document.getElementById('measure-panel').classList.remove('show');
  clearMeasure();
}
function addMeasurePoint(latlng){
  measurePts.push(latlng);
  const dot=L.circleMarker(latlng,{radius:5,color:'#fff',weight:2,fillColor:'#b8852f',fillOpacity:1}).addTo(map);
  measureMarkers.push(dot);
  if(measureLine) map.removeLayer(measureLine);
  if(measurePts.length>1){
    measureLine=L.polyline(measurePts,{color:'#b8852f',weight:3,dashArray:'2 8'}).addTo(map);
  }
  updateMeasureLabel();
}
function totalDistance(){
  let d=0;
  for(let i=1;i<measurePts.length;i++) d+=measurePts[i-1].distanceTo(measurePts[i]);
  return d;
}
function updateMeasureLabel(){
  const d=totalDistance();
  document.getElementById('measure-value').textContent = measurePts.length ? fmtDist(d) : '0 m';
}
function clearMeasure(){
  measurePts=[];
  measureMarkers.forEach(m=>map.removeLayer(m)); measureMarkers=[];
  if(measureLine){map.removeLayer(measureLine);measureLine=null}
  updateMeasureLabel();
}
document.getElementById('measure-clear').addEventListener('click',clearMeasure);

/* ═══════════════════════════════════
   CHIPS — POI search (Overpass) + ruler
═══════════════════════════════════ */
const poiLayers={};

function bboxStr(){const b=map.getBounds();return `${b.getSouth()},${b.getWest()},${b.getNorth()},${b.getEast()}`}

const POI_QUERY={
  transit:['node["public_transport"="station"]','node["highway"="bus_stop"]','node["railway"="station"]'],
  food:['node["amenity"="restaurant"]','node["amenity"="cafe"]'],
  hotel:['node["tourism"="hotel"]','node["tourism"="guest_house"]']
};

async function fetchPOI(key){
  const chip=document.querySelector(`.chip[data-key="${key}"]`);
  if(map.getZoom()<13){
    toast('Perbesar peta untuk melihat tempat di sekitar');
    chip.classList.remove('on');
    return;
  }
  toast('Mencari tempat di sekitar…');
  const bbox=bboxStr();
  const q=`[out:json][timeout:20];(${POI_QUERY[key].map(t=>`${t}(${bbox});`).join('')});out center 50;`;
  try{
    const ctrl=new AbortController();
    const tmo=setTimeout(()=>ctrl.abort(),15000);
    const r=await fetch('https://overpass-api.de/api/interpreter',{method:'POST',body:'data='+encodeURIComponent(q),signal:ctrl.signal});
    clearTimeout(tmo);
    const d=await r.json();
    const group=L.layerGroup();
    (d.elements||[]).forEach(el=>{
      const lat=el.lat ?? el.center?.lat, lon=el.lon ?? el.center?.lon;
      if(lat==null||lon==null) return;
      const name=el.tags?.name || POI_STYLE[key].label;
      const mk=L.marker([lat,lon],{icon:poiIcon(key)}).addTo(group);
      mk.on('click',()=>placeResult(lat,lon,name,name));
    });
    group.addTo(map);
    poiLayers[key]=group;
    toast(d.elements?.length ? `${d.elements.length} tempat ditemukan` : 'Tidak ada tempat ditemukan di area ini');
  }catch{
    toast('Gagal memuat data tempat');
    chip.classList.remove('on');
  }
}
function clearPOI(key){
  if(poiLayers[key]){map.removeLayer(poiLayers[key]);delete poiLayers[key]}
}

document.querySelectorAll('.chip').forEach(c=>{
  c.addEventListener('click',()=>{
    const key=c.dataset.key;
    const turningOn=!c.classList.contains('on');
    c.classList.toggle('on');
    if(key==='measure'){ turningOn?startRuler():stopRuler(); return; }
    turningOn ? fetchPOI(key) : clearPOI(key);
  });
});

/* ═══════════════════════════════════
   HELPERS
═══════════════════════════════════ */
let toastTimer;
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;
  if(!msg){el.classList.remove('show');return}
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>el.classList.remove('show'),2400);
}

function updateStatus(msg){
  const s=document.getElementById('status');
  s.style.display='block';
  s.innerHTML=msg.replace('\n','<br>');
}

setTimeout(()=>toast('Selamat datang di Romaps 👋'),600);
</script>
