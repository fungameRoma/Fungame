<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>RomuMaps</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
/* ── RESET & BASE ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:   #0f172a;
  --ink2:  #334155;
  --muted: #64748b;
  --line:  rgba(255,255,255,.12);
  --blue:  #3b82f6;
  --blue2: #2563eb;
  --green: #22c55e;
  --glass: rgba(255,255,255,.82);
  --glass-dark: rgba(15,23,42,.72);
  --blur:  blur(18px) saturate(180%);
  --r-pill: 999px;
  --r-card: 20px;
  --shadow-sm: 0 2px 8px rgba(0,0,0,.10);
  --shadow-md: 0 4px 24px rgba(0,0,0,.16);
  --shadow-lg: 0 8px 40px rgba(0,0,0,.22);
  --transition: .18s cubic-bezier(.4,0,.2,1);
}
body{font-family:'Inter',system-ui,sans-serif;overflow:hidden;background:#0f172a}
#map{width:100vw;height:100vh}

/* ══════════════════════════════════════
   TOP-LEFT: SEARCH
══════════════════════════════════════ */
#search-wrap{
  position:fixed;top:16px;left:16px;z-index:900;
  width:min(380px,calc(100vw - 80px)); /* leave room for compass */
  display:flex;flex-direction:column;gap:8px;
}

#search-bar{
  background:var(--glass);
  backdrop-filter:var(--blur);
  -webkit-backdrop-filter:var(--blur);
  border-radius:var(--r-pill);
  box-shadow:var(--shadow-md);
  display:flex;align-items:center;
  height:52px;padding:0 8px 0 18px;
  border:1px solid rgba(255,255,255,.6);
  transition:box-shadow var(--transition);
}
#search-bar:focus-within{box-shadow:0 0 0 2px var(--blue),var(--shadow-md)}

.sb-menu{
  background:none;border:none;cursor:pointer;
  color:var(--ink2);padding:6px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  margin-right:4px;transition:background var(--transition);
}
.sb-menu:hover{background:rgba(0,0,0,.06)}

#search-input{
  flex:1;border:none;outline:none;background:transparent;
  font-family:'Inter',sans-serif;font-size:15px;font-weight:400;color:var(--ink);
}
#search-input::placeholder{color:var(--muted)}

#search-go{
  width:38px;height:38px;border-radius:var(--r-pill);border:none;
  background:var(--blue);color:#fff;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background var(--transition),transform var(--transition);flex-shrink:0;
}
#search-go:hover{background:var(--blue2);transform:scale(1.05)}

/* CHIPS — directly below search */
#chips{display:flex;gap:6px;padding-left:2px;flex-wrap:nowrap;overflow-x:auto}
#chips::-webkit-scrollbar{display:none}
.chip{
  white-space:nowrap;
  background:var(--glass);
  backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);
  border:1px solid rgba(255,255,255,.55);
  border-radius:var(--r-pill);
  box-shadow:var(--shadow-sm);
  padding:6px 14px;
  font-family:'Inter',sans-serif;font-size:12px;font-weight:500;
  color:var(--ink2);cursor:pointer;
  display:flex;align-items:center;gap:5px;
  transition:background var(--transition),color var(--transition),border-color var(--transition);
}
.chip:hover{background:rgba(255,255,255,.95)}
.chip.on{background:var(--blue);color:#fff;border-color:var(--blue)}

/* SUGGESTIONS */
#suggestions{
  background:var(--glass);
  backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);
  border:1px solid rgba(255,255,255,.55);
  border-radius:16px;box-shadow:var(--shadow-md);
  overflow:hidden;display:none;
}
.sg-item{
  display:flex;align-items:center;gap:12px;
  padding:11px 16px;cursor:pointer;
  transition:background var(--transition);
}
.sg-item:hover{background:rgba(0,0,0,.04)}
.sg-item+.sg-item{border-top:1px solid rgba(0,0,0,.05)}
.sg-ico{
  width:34px;height:34px;border-radius:10px;
  background:rgba(59,130,246,.1);
  display:flex;align-items:center;justify-content:center;
  font-size:16px;flex-shrink:0;
}
.sg-name{font-size:14px;font-weight:500;color:var(--ink)}
.sg-addr{font-size:12px;color:var(--muted);margin-top:1px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:260px}

/* ══════════════════════════════════════
   TOP-RIGHT: COMPASS
══════════════════════════════════════ */
#compass{
  position:fixed;top:16px;right:16px;z-index:900;
  width:52px;height:52px;border-radius:50%;
  background:var(--glass);
  backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);
  border:1px solid rgba(255,255,255,.6);
  box-shadow:var(--shadow-md);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:22px;transition:transform .4s ease,box-shadow var(--transition);
}
#compass:hover{box-shadow:var(--shadow-lg)}

/* ══════════════════════════════════════
   RIGHT-MIDDLE: ZOOM + LOCATE
   Stacked, clear of both top & bottom
══════════════════════════════════════ */
#right-ctrl{
  position:fixed;right:16px;
  top:50%;transform:translateY(-50%);
  z-index:900;
  display:flex;flex-direction:column;gap:8px;
  /* shift up a bit so it doesn't crowd layer picker */
  margin-top:-40px;
}
.ctrl-group{
  background:var(--glass);
  backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);
  border:1px solid rgba(255,255,255,.6);
  border-radius:14px;box-shadow:var(--shadow-md);
  overflow:hidden;display:flex;flex-direction:column;
}
.ctrl-btn{
  width:46px;height:46px;border:none;background:transparent;
  cursor:pointer;font-size:20px;font-weight:300;color:var(--ink2);
  display:flex;align-items:center;justify-content:center;
  transition:background var(--transition),color var(--transition);
}
.ctrl-btn:hover{background:rgba(0,0,0,.06);color:var(--ink)}
.ctrl-btn+.ctrl-btn{border-top:1px solid rgba(0,0,0,.07)}

#btn-locate{
  width:46px;height:46px;border-radius:14px;border:none;
  background:var(--glass);
  backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);
  border:1px solid rgba(255,255,255,.6);
  box-shadow:var(--shadow-md);
  cursor:pointer;color:var(--muted);
  display:flex;align-items:center;justify-content:center;
  transition:background var(--transition),color var(--transition),box-shadow var(--transition);
}
#btn-locate:hover{background:rgba(255,255,255,.95);color:var(--blue)}
#btn-locate.on{color:var(--blue);box-shadow:0 0 0 2px var(--blue),var(--shadow-md)}

/* ══════════════════════════════════════
   BOTTOM-CENTER: LAYER PICKER
   Compact pill strip
══════════════════════════════════════ */
#layer-bar{
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
  z-index:900;
  background:var(--glass);
  backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);
  border:1px solid rgba(255,255,255,.6);
  border-radius:var(--r-pill);box-shadow:var(--shadow-md);
  display:flex;align-items:center;gap:4px;padding:5px;
}
.lyr-btn{
  display:flex;align-items:center;gap:7px;
  padding:8px 16px;border-radius:var(--r-pill);border:none;
  background:transparent;cursor:pointer;
  font-family:'Inter',sans-serif;font-size:13px;font-weight:500;
  color:var(--muted);transition:background var(--transition),color var(--transition);
}
.lyr-btn:hover{background:rgba(0,0,0,.06);color:var(--ink)}
.lyr-btn.on{background:var(--ink);color:#fff}
.lyr-btn .lico{font-size:15px}

/* ══════════════════════════════════════
   BOTTOM SHEET: INFO CARD
   Slides up, doesn't float over controls
══════════════════════════════════════ */
#info-sheet{
  position:fixed;bottom:0;left:0;right:0;z-index:910;
  background:#fff;
  border-radius:24px 24px 0 0;
  box-shadow:0 -4px 32px rgba(0,0,0,.18);
  padding:0 0 env(safe-area-inset-bottom,12px);
  transform:translateY(100%);
  transition:transform .32s cubic-bezier(.32,0,.25,1);
}
#info-sheet.open{transform:translateY(0)}

.sheet-drag{
  width:40px;height:4px;border-radius:2px;
  background:#e2e8f0;margin:12px auto 16px;
}

.sheet-body{padding:0 20px 20px}

.sheet-name{font-size:18px;font-weight:600;color:var(--ink);margin-bottom:4px}
.sheet-addr{font-size:13px;color:var(--muted);line-height:1.5;margin-bottom:8px}
.sheet-coords{
  display:inline-flex;align-items:center;gap:5px;
  background:#f1f5f9;border-radius:8px;padding:5px 10px;
  font-size:12px;font-weight:500;color:var(--ink2);font-variant-numeric:tabular-nums;
  margin-bottom:16px;
}

.sheet-actions{display:flex;gap:10px}
.act-btn{
  flex:1;height:44px;border-radius:12px;border:none;
  font-family:'Inter',sans-serif;font-size:14px;font-weight:500;
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;
  transition:filter var(--transition),transform var(--transition);
}
.act-btn:hover{filter:brightness(.93);transform:translateY(-1px)}
.act-btn:active{transform:translateY(0)}
.act-primary{background:var(--blue);color:#fff}
.act-ghost{background:#f1f5f9;color:var(--ink2)}

#sheet-close{
  position:absolute;top:12px;right:16px;
  width:30px;height:30px;border-radius:50%;border:none;
  background:#f1f5f9;cursor:pointer;color:var(--muted);
  display:flex;align-items:center;justify-content:center;font-size:16px;
  transition:background var(--transition);
}
#sheet-close:hover{background:#e2e8f0;color:var(--ink)}

/* ══════════════════════════════════════
   TOAST — top center, clear of everything
══════════════════════════════════════ */
#toast{
  position:fixed;top:80px;left:50%;transform:translateX(-50%) translateY(-8px);
  z-index:999;
  background:var(--glass-dark);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  color:#fff;border-radius:var(--r-pill);
  padding:10px 20px;font-size:13px;font-weight:500;
  white-space:nowrap;pointer-events:none;
  opacity:0;transition:opacity .2s,transform .2s;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ══════════════════════════════════════
   STATUS — bottom right, above layer bar
══════════════════════════════════════ */
#status{
  position:fixed;bottom:80px;right:16px;z-index:900;
  background:var(--glass-dark);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  color:#e2e8f0;border-radius:10px;
  padding:7px 12px;font-size:11px;font-weight:500;
  font-variant-numeric:tabular-nums;
  display:none;max-width:220px;text-align:right;
  border:1px solid rgba(255,255,255,.1);
}

/* ══════════════════════════════════════
   PULSE MARKER
══════════════════════════════════════ */
@keyframes pulse-out{
  0%  {transform:scale(.5);opacity:.9}
  100%{transform:scale(2.8);opacity:0}
}
.p-wrap{position:relative;width:18px;height:18px}
.p-ring{
  position:absolute;top:50%;left:50%;width:18px;height:18px;
  background:rgba(59,130,246,.35);border-radius:50%;
  transform:translate(-50%,-50%);
  animation:pulse-out 2s ease-out infinite;
}
.p-dot{
  width:18px;height:18px;background:var(--blue);
  border-radius:50%;border:2.5px solid #fff;
  box-shadow:0 0 0 3px rgba(59,130,246,.3);
}

/* LEAFLET OVERRIDES */
.leaflet-control-scale{margin:0 0 80px 16px!important}
.leaflet-popup-content-wrapper{border-radius:14px!important;box-shadow:var(--shadow-lg)!important;font-family:'Inter',sans-serif!important}
.leaflet-popup-content{margin:12px 16px!important;font-size:13px!important}
.leaflet-popup-tip-container{display:none}

/* scrollbar */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(0,0,0,.2);border-radius:2px}
</style>
</head>
<body>

<div id="map"></div>

<!-- ── SEARCH ── -->
<div id="search-wrap">
  <div id="search-bar">
    <button class="sb-menu" id="menu-btn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>
    <input id="search-input" type="text" placeholder="Cari tempat, alamat…" autocomplete="off"/>
    <button id="search-go">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
    </button>
  </div>
  <div id="chips">
    <button class="chip" data-key="traffic">🚗 Lalu lintas</button>
    <button class="chip" data-key="transit">🚇 Transit</button>
    <button class="chip" data-key="food">🍜 Makan</button>
    <button class="chip" data-key="hotel">🏨 Hotel</button>
  </div>
  <div id="suggestions"></div>
</div>

<!-- ── COMPASS ── -->
<div id="compass" title="Arah Utara">🧭</div>

<!-- ── RIGHT CONTROLS ── -->
<div id="right-ctrl">
  <div class="ctrl-group">
    <button class="ctrl-btn" id="btn-zi" title="Zoom in">+</button>
    <button class="ctrl-btn" id="btn-zo" title="Zoom out">−</button>
  </div>
  <button id="btn-locate" title="Lokasi saya">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="3"/>
      <path d="M12 2v2.5M12 19.5V22M2 12h2.5M19.5 12H22"/>
      <circle cx="12" cy="12" r="7" stroke-opacity=".3"/>
    </svg>
  </button>
</div>

<!-- ── LAYER BAR ── -->
<div id="layer-bar">
  <button class="lyr-btn on" data-layer="map"><span class="lico">🗺️</span>Peta</button>
  <button class="lyr-btn" data-layer="sat"><span class="lico">🛰️</span>Satelit</button>
  <button class="lyr-btn" data-layer="terrain"><span class="lico">⛰️</span>Terrain</button>
</div>

<!-- ── INFO BOTTOM SHEET ── -->
<div id="info-sheet">
  <button id="sheet-close">✕</button>
  <div class="sheet-drag"></div>
  <div class="sheet-body" id="sheet-body"></div>
</div>

<!-- ── TOAST ── -->
<div id="toast"></div>

<!-- ── STATUS ── -->
<div id="status"></div>

<script>
/* ═══════════════════════════════════
   TILES
═══════════════════════════════════ */
const TILES = {
  map:{url:'https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',attr:'© OpenStreetMap © CARTO',sub:'abcd'},
  sat:{url:'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',attr:'© Esri'},
  terrain:{url:'https://{s}.basemaps.cartocdn.com/rastertiles/voyager_nolabels/{z}/{x}/{y}{r}.png',attr:'© CARTO',sub:'abcd'}
};

/* ═══════════════════════════════════
   MAP
═══════════════════════════════════ */
const map = L.map('map',{center:[-6.2088,106.8456],zoom:13,zoomControl:false});
let tile = addTile('map');
L.control.scale({imperial:false,position:'bottomleft'}).addTo(map);

function addTile(key){
  const t = TILES[key];
  return L.tileLayer(t.url,{attribution:t.attr,subdomains:t.sub||'abc',maxZoom:19}).addTo(map);
}

/* ═══════════════════════════════════
   LAYER SWITCH
═══════════════════════════════════ */
document.querySelectorAll('.lyr-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.lyr-btn').forEach(b=>b.classList.remove('on'));
    btn.classList.add('on');
    map.removeLayer(tile);
    tile = addTile(btn.dataset.layer);
    tile.bringToBack();
  });
});

/* ═══════════════════════════════════
   ZOOM
═══════════════════════════════════ */
document.getElementById('btn-zi').addEventListener('click',()=>map.zoomIn());
document.getElementById('btn-zo').addEventListener('click',()=>map.zoomOut());

/* ═══════════════════════════════════
   REAL-TIME LOCATION
═══════════════════════════════════ */
let uMarker=null,uCircle=null,tracking=false,watchId=null,lastPos=null;

const pulseIcon = L.divIcon({
  className:'',
  html:`<div class="p-wrap"><div class="p-ring"></div><div class="p-dot"></div></div>`,
  iconSize:[18,18],iconAnchor:[9,9]
});

function startTracking(){
  if(!navigator.geolocation){toast('Geolokasi tidak didukung');return}
  tracking=true;
  document.getElementById('btn-locate').classList.add('on');
  toast('Mencari lokasi…');
  watchId=navigator.geolocation.watchPosition(p=>{
    const{latitude:lat,longitude:lng,accuracy:acc}=p.coords;
    lastPos={lat,lng};
    if(!uMarker){
      uMarker=L.marker([lat,lng],{icon:pulseIcon,zIndexOffset:1000}).addTo(map);
      uCircle=L.circle([lat,lng],{radius:acc,color:'#3b82f6',fillColor:'#3b82f6',fillOpacity:.08,weight:1.2}).addTo(map);
      map.setView([lat,lng],15);
    }else{uMarker.setLatLng([lat,lng]);uCircle.setLatLng([lat,lng]).setRadius(acc)}
    updateStatus(`${lat.toFixed(5)}, ${lng.toFixed(5)}\n±${Math.round(acc)} m`);
    toast('Lokasi ditemukan ✓');
  },err=>{
    const m={1:'Akses ditolak',2:'Sinyal lemah',3:'Timeout'};
    toast(m[err.code]||'Error lokasi');
    stopTracking();
  },{enableHighAccuracy:true,timeout:15000,maximumAge:2000});
}

function stopTracking(){
  tracking=false;
  document.getElementById('btn-locate').classList.remove('on');
  if(watchId!==null){navigator.geolocation.clearWatch(watchId);watchId=null}
  document.getElementById('status').style.display='none';
}

document.getElementById('btn-locate').addEventListener('click',()=>{
  tracking?stopTracking():startTracking();
});

setInterval(()=>{
  if(tracking&&lastPos){
    const t=new Date().toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
    updateStatus(`${lastPos.lat.toFixed(5)}, ${lastPos.lng.toFixed(5)}\n${t}`);
  }
},1000);

/* ═══════════════════════════════════
   SEARCH / GEOCODE
═══════════════════════════════════ */
const inp  = document.getElementById('search-input');
const sugg = document.getElementById('suggestions');
let sgTimer;

inp.addEventListener('input',()=>{
  clearTimeout(sgTimer);
  const q=inp.value.trim();
  if(q.length<2){sugg.style.display='none';return}
  sgTimer=setTimeout(()=>fetchSugg(q),360);
});

inp.addEventListener('keydown',e=>{
  if(e.key==='Enter'){clearTimeout(sgTimer);doSearch(inp.value.trim())}
  if(e.key==='Escape'){sugg.style.display='none'}
});

document.getElementById('search-go').addEventListener('click',()=>doSearch(inp.value.trim()));

async function fetchSugg(q){
  try{
    const r=await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(q)}&limit=5`,{headers:{'Accept-Language':'id'}});
    const d=await r.json();
    renderSugg(d);
  }catch{sugg.style.display='none'}
}

function renderSugg(items){
  if(!items.length){sugg.style.display='none';return}
  sugg.innerHTML=items.map(it=>{
    const p=it.display_name.split(',');
    const name=p[0].trim();
    const addr=p.slice(1,3).join(',').trim();
    const ico=getEmoji(it.type||it.class||'');
    return `<div class="sg-item"
      data-lat="${it.lat}" data-lng="${it.lon}"
      data-name="${name}" data-full="${it.display_name}">
      <div class="sg-ico">${ico}</div>
      <div>
        <div class="sg-name">${name}</div>
        <div class="sg-addr">${addr}</div>
      </div>
    </div>`;
  }).join('');
  sugg.style.display='block';
  sugg.querySelectorAll('.sg-item').forEach(el=>{
    el.addEventListener('click',()=>{
      inp.value=el.dataset.name;
      sugg.style.display='none';
      placeResult(+el.dataset.lat,+el.dataset.lng,el.dataset.name,el.dataset.full);
    });
  });
}

function getEmoji(t){
  const m={restaurant:'🍽️',cafe:'☕',school:'🏫',hospital:'🏥',
    hotel:'🏨',park:'🌳',mosque:'🕌',church:'⛪',bank:'🏦',
    supermarket:'🛒',mall:'🏬',airport:'✈️',station:'🚉',fuel:'⛽',pharmacy:'💊'};
  for(const k of Object.keys(m))if(t.includes(k))return m[k];
  return '📍';
}

async function doSearch(q){
  if(!q)return;
  sugg.style.display='none';
  toast('Mencari "'+q+'"…');
  try{
    const r=await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(q)}&limit=1`,{headers:{'Accept-Language':'id'}});
    const d=await r.json();
    if(!d.length){toast('Lokasi tidak ditemukan');return}
    const it=d[0];
    const name=it.display_name.split(',')[0].trim();
    inp.value=name;
    placeResult(+it.lat,+it.lon,name,it.display_name);
  }catch{toast('Koneksi gagal')}
}

/* ═══════════════════════════════════
   PLACE RESULT + BOTTOM SHEET
═══════════════════════════════════ */
let pinMarker=null;

function placeResult(lat,lng,name,full){
  if(pinMarker)map.removeLayer(pinMarker);
  pinMarker=L.marker([lat,lng]).addTo(map);
  map.flyTo([lat,lng],15,{duration:1.2});
  showSheet(name,full,lat,lng);
  toast('');
}

function showSheet(name,full,lat,lng){
  const addr=full.split(',').slice(1,4).join(',').trim();
  document.getElementById('sheet-body').innerHTML=`
    <div class="sheet-name">${name}</div>
    <div class="sheet-addr">${addr||full}</div>
    <div class="sheet-coords">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round">
        <circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/>
      </svg>
      ${lat.toFixed(6)}, ${lng.toFixed(6)}
    </div>
    <div class="sheet-actions">
      <button class="act-btn act-primary" onclick="openRoute(${lat},${lng})">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="#fff"><path d="M22 12l-9-9v4.5C5.5 8 2 13 2 19c2-4.5 5.5-6.5 11-6.5V17l9-5z"/></svg>
        Rute
      </button>
      <button class="act-btn act-ghost" onclick="copyCoords(${lat},${lng})">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
        </svg>
        Salin
      </button>
      <button class="act-btn act-ghost" onclick="openOSM(${lat},${lng})">
        🔗 Buka
      </button>
    </div>`;
  document.getElementById('info-sheet').classList.add('open');
}

document.getElementById('sheet-close').addEventListener('click',()=>{
  document.getElementById('info-sheet').classList.remove('open');
  if(pinMarker){map.removeLayer(pinMarker);pinMarker=null}
  inp.value='';
});

function openRoute(lat,lng){
  if(!lastPos){toast('Aktifkan lokasi dulu');return}
  window.open(`https://www.openstreetmap.org/directions?route=${lastPos.lat},${lastPos.lng};${lat},${lng}`,'_blank');
}
function copyCoords(lat,lng){
  navigator.clipboard.writeText(`${lat}, ${lng}`).then(()=>toast('Koordinat disalin ✓'));
}
function openOSM(lat,lng){
  window.open(`https://www.openstreetmap.org/?mlat=${lat}&mlon=${lng}#map=15/${lat}/${lng}`,'_blank');
}

/* ═══════════════════════════════════
   CLICK MAP → REVERSE GEOCODE
═══════════════════════════════════ */
map.on('click',async e=>{
  const{lat,lng}=e.latlng;
  if(pinMarker)map.removeLayer(pinMarker);
  pinMarker=L.marker([lat,lng]).addTo(map);
  toast('Mencari alamat…');
  try{
    const r=await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`,{headers:{'Accept-Language':'id'}});
    const d=await r.json();
    const name=d.address?.road||d.address?.suburb||d.address?.city||d.name||'Titik Ini';
    inp.value=name;
    showSheet(name,d.display_name||`${lat.toFixed(5)}, ${lng.toFixed(5)}`,lat,lng);
    toast('');
  }catch{toast('')}
});

/* ═══════════════════════════════════
   CHIPS
═══════════════════════════════════ */
document.querySelectorAll('.chip').forEach(c=>{
  c.addEventListener('click',()=>{
    const was=c.classList.contains('on');
    c.classList.toggle('on');
    toast(was?`${c.textContent.trim()} off`:`${c.textContent.trim()} aktif`);
  });
});

/* ═══════════════════════════════════
   COMPASS
═══════════════════════════════════ */
document.getElementById('compass').addEventListener('click',()=>toast('Arah: Utara ↑'));

/* ═══════════════════════════════════
   CLOSE SUGGESTIONS
═══════════════════════════════════ */
document.addEventListener('click',e=>{
  if(!document.getElementById('search-wrap').contains(e.target))
    sugg.style.display='none';
});

/* ═══════════════════════════════════
   HELPERS
═══════════════════════════════════ */
let toastTimer;
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;
  if(!msg){el.classList.remove('show');return}
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>el.classList.remove('show'),2400);
}

function updateStatus(msg){
  const s=document.getElementById('status');
  s.style.display='block';
  s.innerHTML=msg.replace('\n','<br>');
}

setTimeout(()=>toast('Selamat datang di RomuMaps 👋'),600);
</script>
</body>
</html>
