<!DOCTYPE html><html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SUPER GAME PACK</title>
<style>
body { margin:0; font-family:Arial; background:#0f172a; color:white; text-align:center; }
h1 { margin:10px; }
.menu { display:flex; flex-wrap:wrap; justify-content:center; gap:10px; }
button { padding:10px 15px; border:none; border-radius:10px; background:#22c55e; color:white; cursor:pointer; }
.game { display:none; margin-top:15px; }
canvas { background:#000; border-radius:10px; }
</style>
</head>
<body>
<h1>🔥 SUPER GAME PACK 🔥</h1>
<div class="menu">
<button onclick="showGame('clicker')">Clicker</button>
<button onclick="showGame('snake')">Snake</button>
<button onclick="showGame('dodge')">Dodge</button>
<button onclick="showGame('memory')">Memory</button>
<button onclick="showGame('reaction')">Reaction</button>
</div><div id="clicker" class="game">
<h2>⚡ Clicker Extreme</h2>
<p>Score: <span id="score">0</span></p>
<button onclick="addScore()">KLIK CEPAT!</button>
</div><div id="snake" class="game">
<h2>🐍 Snake Pro</h2>
<canvas id="snakeCanvas" width="300" height="300"></canvas>
</div><div id="dodge" class="game">
<h2>🟥 Dodge Blocks</h2>
<canvas id="dodgeCanvas" width="300" height="300"></canvas>
</div><div id="memory" class="game">
<h2>🧠 Memory Game</h2>
<p id="memoryText">Ingat angka ini: <span id="num"></span></p>
<input id="guess" placeholder="Masukkan angka">
<button onclick="checkMemory()">Cek</button>
</div><div id="reaction" class="game">
<h2>⚡ Reaction Test</h2>
<p id="reactText">Tunggu warna hijau...</p>
<button onclick="startReaction()">Mulai</button>
</div><script>
function showGame(id){
 document.querySelectorAll('.game').forEach(g=>g.style.display='none');
 document.getElementById(id).style.display='block';
}

// CLICKER
let score=0;
function addScore(){ score++; document.getElementById('score').innerText=score; }

// SNAKE
let sc=document.getElementById('snakeCanvas');
let sctx=sc.getContext('2d');
let snake=[{x:150,y:150}], food={x:100,y:100}, dx=10, dy=0;
document.addEventListener('keydown',e=>{
 if(e.key=='ArrowUp'){dx=0;dy=-10}
 if(e.key=='ArrowDown'){dx=0;dy=10}
 if(e.key=='ArrowLeft'){dx=-10;dy=0}
 if(e.key=='ArrowRight'){dx=10;dy=0}
});
function snakeGame(){
 sctx.clearRect(0,0,300,300);
 let head={x:snake[0].x+dx,y:snake[0].y+dy};
 snake.unshift(head);
 if(head.x==food.x && head.y==food.y){
  food={x:Math.random()*280,y:Math.random()*280};
 } else snake.pop();
 sctx.fillStyle='lime'; snake.forEach(p=>sctx.fillRect(p.x,p.y,10,10));
 sctx.fillStyle='red'; sctx.fillRect(food.x,food.y,10,10);
}
setInterval(snakeGame,100);

// DODGE
let dc=document.getElementById('dodgeCanvas');
let dctx=dc.getContext('2d');
let player={x:140,y:260}; let blocks=[];
document.addEventListener('keydown',e=>{
 if(e.key=='ArrowLeft') player.x-=20;
 if(e.key=='ArrowRight') player.x+=20;
});
function dodgeGame(){
 dctx.clearRect(0,0,300,300);
 if(Math.random()<0.05){blocks.push({x:Math.random()*280,y:0});}
 blocks.forEach(b=>{
  b.y+=5;
  dctx.fillStyle='red'; dctx.fillRect(b.x,b.y,20,20);
  if(b.y>260 && b.x<player.x+20 && b.x+20>player.x){ alert('Game Over'); location.reload(); }
 });
 dctx.fillStyle='white'; dctx.fillRect(player.x,player.y,20,20);
}
setInterval(dodgeGame,50);

// MEMORY
let number=Math.floor(Math.random()*9000)+1000;
document.getElementById('num').innerText=number;
setTimeout(()=>{document.getElementById('num').innerText='???';},2000);
function checkMemory(){
 let g=document.getElementById('guess').value;
 alert(g==number?'BENAR!':'SALAH!');
}

// REACTION
let startTime;
function startReaction(){
 document.getElementById('reactText').innerText='Tunggu...';
 setTimeout(()=>{
  document.getElementById('reactText').innerText='KLIK SEKARANG!';
  startTime=Date.now();
 },Math.random()*3000+1000);
}
document.body.addEventListener('click',()=>{
 if(startTime){
  let t=Date.now()-startTime;
  alert('Reaksi: '+t+' ms');
  startTime=null;
 }
});
</script></body>
</html>
