<!DOCTYPE html><html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Games Seru</title>
<style>
body { font-family: Arial; background:#111; color:white; text-align:center; }
button { padding:10px; margin:5px; border:none; border-radius:8px; cursor:pointer; }
.game { display:none; margin-top:20px; }
canvas { background:#000; }
</style>
</head>
<body>
<h1>🎮 Mini Games Seru</h1><button onclick="showGame('clicker')">Clicker</button> <button onclick="showGame('snake')">Snake</button> <button onclick="showGame('block')">Block Dodge</button>

<div id="clicker" class="game">
<h2>Clicker Game</h2>
<p>Score: <span id="score">0</span></p>
<button onclick="addScore()">Klik Cepat!</button>
</div><div id="snake" class="game">
<h2>Snake Game</h2>
<canvas id="snakeCanvas" width="300" height="300"></canvas>
</div><div id="block" class="game">
<h2>Block Dodge</h2>
<canvas id="blockCanvas" width="300" height="300"></canvas>
</div><script>
function showGame(id){
 document.querySelectorAll('.game').forEach(g=>g.style.display='none');
 document.getElementById(id).style.display='block';
}

// CLICKER
let score=0;
function addScore(){ score++; document.getElementById('score').innerText=score; }

// SNAKE
let sc = document.getElementById('snakeCanvas');
let sctx = sc.getContext('2d');
let snake=[{x:150,y:150}];
let food={x:100,y:100};
let dx=10,dy=0;
document.addEventListener('keydown',e=>{
 if(e.key=='ArrowUp'){dx=0;dy=-10}
 if(e.key=='ArrowDown'){dx=0;dy=10}
 if(e.key=='ArrowLeft'){dx=-10;dy=0}
 if(e.key=='ArrowRight'){dx=10;dy=0}
});
function snakeGame(){
 sctx.clearRect(0,0,300,300);
 let head={x:snake[0].x+dx,y:snake[0].y+dy};
 snake.unshift(head);
 if(head.x==food.x && head.y==food.y){
  food={x:Math.floor(Math.random()*30)*10,y:Math.floor(Math.random()*30)*10};
 } else snake.pop();
 sctx.fillStyle='lime';
 snake.forEach(p=>sctx.fillRect(p.x,p.y,10,10));
 sctx.fillStyle='red';
 sctx.fillRect(food.x,food.y,10,10);
}
setInterval(snakeGame,100);

// BLOCK DODGE
let bc = document.getElementById('blockCanvas');
let bctx = bc.getContext('2d');
let player={x:140,y:260};
let blocks=[];
document.addEventListener('keydown',e=>{
 if(e.key=='ArrowLeft') player.x-=20;
 if(e.key=='ArrowRight') player.x+=20;
});
function blockGame(){
 bctx.clearRect(0,0,300,300);
 if(Math.random()<0.05){
  blocks.push({x:Math.random()*280,y:0});
 }
 blocks.forEach(b=>{
  b.y+=5;
  bctx.fillStyle='red';
  bctx.fillRect(b.x,b.y,20,20);
  if(b.y>260 && b.x<player.x+20 && b.x+20>player.x){ alert('Game Over!'); location.reload(); }
 });
 bctx.fillStyle='white';
 bctx.fillRect(player.x,player.y,20,20);
}
setInterval(blockGame,50);
</script></body>
</html>
